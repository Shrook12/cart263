<!DOCTYPE html>
<htmL>

<head>
    <title> Project 1</title>
    <!-- link to css-->
    <link rel="stylesheet" href="css/style.css">
    <!-- link to main script-->

</head>

<body>

    <section id="container">
        <aside>
            <div id="draggable-tool">
                <div id="sticker1" class="box" draggable="true">
                    <img src="images/texture1.png" width="100" height="100">
                </div>
                <div id="sticker2" class="box" draggable="true">
                    <img src="images/texture2.png" width="100" height="100">
                </div>
                <div id="sticker3" class="box" draggable="true">
                    <img src="images/texture3.png" width="100" height="100">
                </div>
                <div id="sticker4" class="box" draggable="true">
                    <img src="images/texture4.png" width="100" height="100">
                </div>
                <div id="sticker5" class="box" draggable="true">
                    <img src="images/texture5.png" width="100" height="100">
                </div>
                <div id="sticker6" class="box" draggable="true">
                    <img src="images/texture6.png" width="100" height="100">
                </div>
                <div id="sticker7" class="box" draggable="true">
                    <img src="images/texture7.png" width="100" height="100">
                </div>
                <div id="sticker8" class="box" draggable="true">
                    <img src="images/texture8.png" width="100" height="100">
                </div>
                <div id="sticker9" class="box" draggable="true">
                    <img src="images/texture9.png" width="100" height="100">
                </div>
                <div id="sticker10" class="box" draggable="true">
                    <img src="images/texture10.png" width="100" height="100">
                </div>
                <div id="sticker11" class="box" draggable="true">
                    <img src="images/texture11.png" width="100" height="100">
                </div>
            </div>
        </aside>

        <!--   <img src="images/paper.png"> -->
        <section class="workspace">
            <div class="canvasarea">
                <canvas id="drawingCanvas" width=1000 height=600></canvas>
            </div>


            <div id="toolbar">
                <input type="color" id="colorChange" value="#000000">
                <button id="drawPencil" class="button">
                    <img src="images/pencil.PNG">
                </button>
                <button id="eraser" class="button">
                    <img src="images/eraser.PNG">
                </button>
                <button id="pen" class="button">
                    <img src="images/pen.PNG">
                </button>
                <button id="brush" class="button">
                    <img src="images/brush.PNG">
                </button>


                <div class="slide">
                    <input type="range" min="1" max="100" value="5" class="slider" id="slider">
                </div>



                <button id="undo" class="button">
                    <img src="images/undo.png">
                </button>
                <button id="redo" class="button">
                    <img src="images/redo.png">
                </button>
                <button id="clear" class="button2">
                    Clear
                </button>
                <button id="save" class="button2">
                    Save
                </button>



            </div>
        </section>
        <div id="challenge">
            <div class="header">
                <h3>You can do this challenge or not:)!</h3>
                <span id="arrow">▼</span>

            </div>

            <div id="content">
                <p id="random-challenge"></p>
            </div>

        </div>
        <div id="overlap" class="break-message">
            <div id="exercise-box">

                <img id="exercise-img" src="">
                <h1 id="title"></h1>
                <p id="message-content"></p>

            </div>
        </div>
    </section>


</body>
<script type="text/javascript" src="js/script.js"></script>

</html>
